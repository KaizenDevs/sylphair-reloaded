<ion-view name="create-pilot-2-view" view-title="{{'create_job_pilot_title' | translate }}">
  <ion-nav-bar class="bar-dark-light">
    <ion-nav-buttons side="left">
      <button class="button button-icon button-clear ion-navicon" menu-toggle="left">
    </button>
    </ion-nav-buttons>
    <ion-nav-buttons side="right">
      <button ng-show="showCancelEdit" ng-click="cancelEdit()" class="button-cancel-edit">
          <span translate="cancel_label"></span>
      </button>
    </ion-nav-buttons>
  </ion-nav-bar>
  <ion-content padding="true">
    <div class="list">
      <label class="item item-input item-select">
		    <div class="input-label" translate="position_label"></div>
				<select ng-model="job.position" ng-options="position.value as position.name | translate for position in pilot_positions">
				</select>
		  </label>
      <label class="item item-input item-select">
        <div class="input-label" translate="country_label"></div>
        <select ng-model="job.country_id" ng-options="country.id as country.name | translate for country in countries">
        </select>
      </label>

      <label class="item item-input item-select">
		    <div class="input-label" translate="contract_type_label"></div>
				<select ng-model="job.contract_type" ng-options="contract_type.value as contract_type.name | translate for contract_type in contract_types">
				</select>
		  </label>

      <label class="item item-input item-select">
		    <div class="input-label" translate="aircraft_label"></div>
				<select ng-model="job.aircraft_id" ng-options="aircraft.id as aircraft.name for aircraft in aircrafts">
				</select>
		  </label>

      <label class="item item-input">
				<div class="input-label">
					<span translate="minimum_time_label"></span><br>
          <span translate="required_time_label"></span>
				</div>
				<input class="right-placeholder" type="number" placeholder="{{'no_spaces_placeholder' | translate}}" ng-model="job.time_on_type">
			</label>

      <label class="item item-input item-input-date">
		    <div class="input-label" translate="start_date_label"></div>
		    <input type="date" class="input-date" ng-model="job.start_date">
		  </label>
      <label class="item item-input item-input-date">
		    <div class="input-label" translate="end_date_label"></div>
		    <input type="date" class="input-date" ng-model="job.end_date">
		  </label>
      <!-- <label class="item item-input">
				<div class="input-label">
					Publication<br>
          active days
				</div>
				<input class="right-placeholder" type="number" placeholder="No spaces" ng-model="job.days_active">
			</label> -->
      <label class="item item-input">
				<div class="input-label" translate="monthly_salary_label"></div>
				<input class="right-placeholder" type="number" placeholder="{{'no_spaces_placeholder' | translate }}" ng-model="job.monthly_salary">
			</label>

      <label class="item item-input clean">
		    <ion-checkbox ng-model="job.allowanceShow">
          <span translate="allowance_info_label"></span>  
        </ion-checkbox>
		  </label>
      <br>

      <div class="list" ng-show="job.allowanceShow">
        <label class="item item-input clean">
  		    <ion-checkbox ng-model="job.allowance.housing">
            <span translate="housing_label"></span>  
          </ion-checkbox>
  		  </label>

        <label class="item item-input clean">
  		    <ion-checkbox ng-model="job.allowance.transportation">
            <span translate="transportation_label"></span>  
          </ion-checkbox>
  		  </label>

        <label class="item item-input clean">
  		    <ion-checkbox ng-model="job.allowance.education">
            <span translate="education_label"></span>  
          </ion-checkbox>
  		  </label>

        <label class="item item-input clean">
  		    <ion-checkbox ng-model="job.allowance.other">
            <span translate="other_label"></span>  
          </ion-checkbox>
  		  </label>

        <label class="item item-input item-stacked-label">
  				<span class="input-label" translate="allowance_info_label"></span>
  				<textarea ng-model="job.allowance.description" rows="10" cols="10"></textarea>
  			</label>
      </div>
      <button ng-show="!editingJob" class="button icon-left button-block button-positive" ng-click="doCreateJob()" translate="create_job_label"></button>
      <button ng-show="editingJob" class="button icon-left button-block button-positive" ng-click="doEditJob()" translate="edit_job_label"></button>
    </div>
  </ion-content>
</ion-view>
