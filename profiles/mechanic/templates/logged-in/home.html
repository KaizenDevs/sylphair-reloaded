<ion-view name="aom-home-view" view-title="{{'mechanic_home_title' | translate}}" hide-back-button="true" animation="slide-left-right">

  <ion-nav-buttons side="left">
    <button ng-click="menu()" class="button button-icon button-clear ion-navicon" menu-toggle="left"></button>
  </ion-nav-buttons>

  <ion-content padding="true">

    <section class="container">
      <div class="element padding">
        <a href="#/app-mechanic/job-search" class="button search button-block text-left icon-left ion-plane button-block button-positive">
          <span translate="search_job_label"></span>
        </a>
      </div>
      <div class="element padding">
        <a href="#/app-mechanic/messages-list" class="messages button button-block text-left icon-left ion-android-chat button-block button-positive">
          <span translate="messages_label"></span>
        </a>
      </div>
    </section>

  </ion-content>
</ion-view>
