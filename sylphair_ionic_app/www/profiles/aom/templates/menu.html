<ion-side-menus enable-menu-with-back-views="true">
  <ion-side-menu-content>
    <ion-nav-bar class="bar-stable">
      <ion-nav-back-button>
      </ion-nav-back-button>

      <ion-nav-buttons side="left">
        <button class="button button-icon button-clear ion-navicon" menu-toggle="left"></button>
      </ion-nav-buttons>
    </ion-nav-bar>
    <ion-nav-view name="menuContent"></ion-nav-view>
  </ion-side-menu-content>

  <ion-side-menu side="left">
    <ion-header-bar class="bar-stable">
      <h1 class="title" translate="menu_title"></h1>
    </ion-header-bar>
    <ion-content>
      <ion-list>
        <ion-item menu-toggle href="#/app-aom/aom-home">
          <span translate="home_label"></span>
        </ion-item>
        <ion-item menu-toggle href="#/app-aom/my-profile">
          <span translate="my_profile_label"></span>
        </ion-item>
        <ion-item menu-toggle href="#app-aom/search">
          <span translate="search_professionals_label"></span>
        </ion-item>
        <ion-item class="post-job" menu-toggle href="#/app-aom/create-job">
          <span translate="post_job_label"></span>
        </ion-item>
        <ion-item menu-toggle class="posted-jobs" href="#/app-aom/messages-list">
          <span translate="messages_label"></span>
          <strong class="number-jobs">{{ conversations.length }}</strong>
        </ion-item>
        <ion-item class="posted-jobs" menu-toggle href="#app-aom/jobs-created">
          <span translate="posted_jobs_label"></span>
          <strong class="number-jobs">{{ postedJobs }}</strong>
        </ion-item>
        <ion-item ng-if="activateLanguages" menu-toggle>
          <button-lang-en ng-click="changeLanguage('en')"></button-lang-en>
          <button-lang-sp ng-click="changeLanguage('sp')" style="margin-left: 20px"></button-lang-sp>
        </ion-item>
        <ion-item class="logout" menu-toggle ng-click="logout()">
          <span translate="logout_label"></span>
        </ion-item>
      </ion-list>

      <p class="app-version">Sylphair Aviation<br>
        <span>{{ 'version_label' | translate }}: {{app_version}}</span>
      </p>

    </ion-content>
  </ion-side-menu>
</ion-side-menus>
