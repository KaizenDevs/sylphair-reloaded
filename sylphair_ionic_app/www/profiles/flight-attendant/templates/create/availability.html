<ion-view name="create-pilot-5-view" view-title="{{ 'availability_title' | translate }}">
  <ion-nav-bar class="bar-dark-light">
    <ion-nav-buttons side="left">
      <button class="button button-icon button-clear ion-navicon" menu-toggle="left">
    </button>
    </ion-nav-buttons>
    <ion-nav-buttons side="right">
      <button ng-show="showCancelEdit" ng-click="cancelEdit()" class="button-cancel-edit">
          <span translate="cancel_label"></span>
      </button>
    </ion-nav-buttons>
  </ion-nav-bar>
  <ion-content padding="true">
    <div class="list" ng-repeat="availability in createFlightAttendant.availability track by $index">

      <label class="item item-input clean">
		    <ion-checkbox ng-model="availability.full_time" ng-change="simpleSave.save('{{currentKey}}.availability.{{$index}}.full_time', availability.full_time)">
          <span translate="full_time_label"></span>  
        </ion-checkbox>
		  </label>
      <label class="item item-input clean">
		    <ion-checkbox ng-model="availability.part_time" ng-change="simpleSave.save('{{currentKey}}.availability.{{$index}}.part_time', availability.part_time)">
          <span translate="part_time_label"></span>  
        </ion-checkbox>
		  </label>
      <label class="freelancer item item-input clean">
		    <ion-checkbox ng-model="availability.freelancer" ng-change="simpleSave.save('{{currentKey}}.availability.{{$index}}.freelancer', availability.freelancer)">
          <span translate="freelancer_label"></span>   
        </ion-checkbox>
		  </label>
      <label class="item item-input clean">
		    <ion-checkbox ng-model="availability.other" ng-change="simpleSave.save('{{currentKey}}.availability.{{$index}}.other', availability.other)">
          <span translate="other_label"></span>
        </ion-checkbox>
		  </label>
      <label class="item item-input item-stacked-label">
		    <span class="input-label" translate="additional_information"></span>
		    <textarea  ng-model="availability.availability_additional_info" ng-change="simpleSave.save('{{currentKey}}.availability.{{$index}}.availability_additional_info', availability.availability_additional_info)" placeholder="{{'availability_additional_info' | translate }}" rows="6"></textarea>
		  </label>
    </div>
  </ion-content>
  <ion-footer-bar align-title="center" class="footer-bar">
    <div class="row m-0">
      <div class="col"><a href="{{backURL}}" class="button next ion-chevron-left"> {{'back_label' | translate }}</a></div>
      <div class="col text-center step-count">4/7</div>
      <div ng-click="vm.validateAvailability()" class="col text-right"><a class="button  next icon-right ion-chevron-right" translate="next_label"></a></div>
    </div>
  </ion-footer-bar>
</ion-view>
