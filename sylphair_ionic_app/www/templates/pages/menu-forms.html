<ion-side-menus enable-menu-with-back-views="true">
  <ion-side-menu-content>
    <ion-nav-bar class="bar-stable">
      <!-- <ion-nav-back-button>
      </ion-nav-back-button> -->

      <ion-nav-buttons side="left" enable-menu-with-back-views="false">
        <button class="button button-icon button-clear ion-navicon" menu-toggle="left"></button>
      </ion-nav-buttons>
    </ion-nav-bar>
    <ion-nav-view name="menuContent"></ion-nav-view>
  </ion-side-menu-content>

  <ion-side-menu side="left">
    <ion-header-bar class="bar-stable">
      <h1 class="title" translate="menu_title"></h1>
    </ion-header-bar>
    <ion-content>
      <ion-list>
        <!-- <ion-item menu-toggle href="#">
          Help
        </ion-item> -->
        <ion-item ng-if="activateLanguages" menu-toggle>
          <button-lang-en ng-click="changeLanguage('en')"></button-lang-en>
          <button-lang-sp ng-click="changeLanguage('sp')" style="margin-left: 20px"></button-lang-zh>
        </ion-item>
        <ion-item class="logout" menu-toggle ng-click="logout()" translate="logout_label">
        </ion-item>
      </ion-list>
      <p class="app-version">
        Sylphair Aviation <br>
        <span translate="version_label"></span>
        <span>{{app_version}}</span>
      </p>
    </ion-content>
  </ion-side-menu>
</ion-side-menus>
